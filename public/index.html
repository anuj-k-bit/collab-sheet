<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CollabSheet — Live Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --indigo: #4f46e5;
    --indigo-light: #e0e7ff;
    --indigo-dark: #3730a3;
    --slate-50: #f8fafc;
    --slate-100: #f1f5f9;
    --slate-200: #e2e8f0;
    --slate-300: #cbd5e1;
    --slate-400: #94a3b8;
    --slate-500: #64748b;
    --slate-700: #334155;
    --slate-900: #0f172a;
    --green: #22c55e;
    --red: #ef4444;
    --cell-h: 26px;
    --header-h: 26px;
    --row-w: 48px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--slate-50);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; height: 100vh; }
  .screen.active { display: flex; }

  /* ══ SIGN-IN SCREEN ══ */
  #signin {
    background: linear-gradient(135deg, #f0f4ff 0%, #fafafa 50%, #f5f3ff 100%);
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  .signin-card {
    background: white;
    border: 1px solid var(--slate-200);
    border-radius: 16px;
    padding: 40px;
    width: 380px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
    animation: fadeUp 0.5s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: var(--indigo);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .logo-icon svg rect { fill: white; }

  .logo-text {
    font-size: 20px;
    font-weight: 600;
    color: var(--slate-900);
    letter-spacing: -0.3px;
  }

  .signin-title { font-size: 22px; font-weight: 600; color: var(--slate-900); margin-bottom: 6px; }
  .signin-sub { font-size: 14px; color: var(--slate-500); margin-bottom: 28px; }

  .btn-google {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 11px;
    border: 1.5px solid var(--slate-200);
    border-radius: 8px;
    background: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--slate-700);
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 12px;
  }
  .btn-google:hover { background: var(--slate-50); border-color: var(--slate-300); }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 16px 0;
    color: var(--slate-400); font-size: 12px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--slate-200);
  }

  .guest-input {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--slate-200);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--slate-900);
    outline: none;
    margin-bottom: 10px;
    transition: border-color 0.15s;
  }
  .guest-input:focus { border-color: var(--indigo); }

  .btn-primary {
    width: 100%;
    padding: 11px;
    background: var(--indigo);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--indigo-dark); }

  /* ══ DASHBOARD SCREEN ══ */
  #dashboard { background: var(--slate-50); }

  .dash-header {
    background: white;
    border-bottom: 1px solid var(--slate-200);
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    flex-shrink: 0;
  }

  .dash-logo { display: flex; align-items: center; gap: 8px; }
  .dash-logo span { font-weight: 600; font-size: 16px; color: var(--slate-900); }

  .user-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 13px; font-weight: 600;
    cursor: pointer;
  }

  .dash-main { flex: 1; overflow-y: auto; padding: 36px 32px; max-width: 900px; margin: 0 auto; width: 100%; }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--slate-400);
    margin-bottom: 16px;
  }

  .new-card {
    width: 140px; height: 160px;
    border: 2px dashed var(--slate-200);
    border-radius: 12px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 32px;
  }
  .new-card:hover { border-color: var(--indigo); background: var(--indigo-light); }
  .new-card:hover .new-icon { background: #c7d2fe; }
  .new-card:hover .new-label { color: var(--indigo); }

  .new-icon {
    width: 40px; height: 40px;
    background: var(--slate-100);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }

  .new-label { font-size: 13px; font-weight: 500; color: var(--slate-500); transition: color 0.15s; }

  .doc-list {
    background: white;
    border: 1px solid var(--slate-200);
    border-radius: 12px;
    overflow: hidden;
  }

  .doc-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--slate-100);
    cursor: pointer;
    transition: background 0.1s;
  }
  .doc-item:last-child { border-bottom: none; }
  .doc-item:hover { background: var(--slate-50); }
  .doc-item:hover .doc-delete { opacity: 1; }

  .doc-icon {
    width: 32px; height: 32px;
    background: var(--indigo-light);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .doc-info { flex: 1; min-width: 0; }
  .doc-name { font-size: 14px; font-weight: 500; color: var(--slate-900); }
  .doc-meta { font-size: 12px; color: var(--slate-400); margin-top: 2px; }

  .doc-delete {
    opacity: 0;
    padding: 4px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--slate-300);
    transition: all 0.15s;
    border: none; background: none;
  }
  .doc-delete:hover { color: var(--red); background: #fef2f2; }

  /* ══ EDITOR SCREEN ══ */
  #editor { background: white; }

  .editor-topbar {
    height: 48px;
    border-bottom: 1px solid var(--slate-200);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    flex-shrink: 0;
    background: white;
  }

  .topbar-left { display: flex; align-items: center; gap: 8px; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }

  .icon-btn {
    width: 28px; height: 28px;
    border: none; background: none;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--slate-400);
    transition: all 0.1s;
  }
  .icon-btn:hover { background: var(--slate-100); color: var(--slate-600); }

  .divider-v { width: 1px; height: 16px; background: var(--slate-200); }

  .app-logo-sm {
    width: 24px; height: 24px;
    background: var(--indigo);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
  }

  .write-status {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px;
    color: var(--slate-400);
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
  }

  .presence-bar { display: flex; align-items: center; gap: -4px; }

  .peer-avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2px solid white;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 10px; font-weight: 600;
    margin-left: -6px;
    first-child: margin-left: 0;
    cursor: default;
  }

  /* Toolbar */
  .toolbar {
    height: 38px;
    border-bottom: 1px solid var(--slate-200);
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 2px;
    flex-shrink: 0;
    background: white;
  }

  .title-input {
    border: none; outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--slate-700);
    padding: 4px 8px;
    border-radius: 5px;
    width: 200px;
    transition: background 0.1s;
  }
  .title-input:hover { background: var(--slate-100); }
  .title-input:focus { background: var(--slate-100); }

  .toolbar-sep { width: 1px; height: 20px; background: var(--slate-200); margin: 0 4px; }

  .tb-btn {
    height: 26px;
    padding: 0 8px;
    border: none; background: none;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--slate-600);
    cursor: pointer;
    transition: background 0.1s;
    display: flex; align-items: center; gap: 4px;
  }
  .tb-btn:hover { background: var(--slate-100); }
  .tb-btn.active { background: var(--indigo-light); color: var(--indigo); }

  .color-swatch {
    width: 14px; height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.1);
  }

  /* Formula bar */
  .formula-bar {
    height: 32px;
    border-bottom: 1px solid var(--slate-200);
    display: flex;
    align-items: center;
    flex-shrink: 0;
    background: white;
  }

  .cell-label {
    width: 80px;
    height: 100%;
    border-right: 1px solid var(--slate-200);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--slate-600);
    flex-shrink: 0;
  }

  .fx-label {
    padding: 0 10px;
    font-size: 12px;
    color: var(--slate-400);
    font-style: italic;
    border-right: 1px solid var(--slate-200);
    height: 100%;
    display: flex; align-items: center;
    flex-shrink: 0;
  }

  .formula-input {
    flex: 1;
    height: 100%;
    border: none; outline: none;
    padding: 0 10px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--slate-700);
  }

  /* Grid */
  .grid-container {
    flex: 1;
    overflow: auto;
    position: relative;
  }

  table {
    border-collapse: collapse;
    table-layout: fixed;
  }

  thead { position: sticky; top: 0; z-index: 30; }

  .corner-th {
    width: var(--row-w);
    min-width: var(--row-w);
    height: var(--header-h);
    background: var(--slate-50);
    border-bottom: 1px solid var(--slate-300);
    border-right: 1px solid var(--slate-300);
  }

  .col-th {
    height: var(--header-h);
    background: var(--slate-50);
    border-bottom: 1px solid var(--slate-300);
    border-right: 1px solid var(--slate-200);
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--slate-500);
    user-select: none;
    cursor: default;
    position: relative;
  }
  .col-th.selected { background: #e0e7ff; color: var(--indigo); }

  .row-th {
    width: var(--row-w);
    min-width: var(--row-w);
    background: var(--slate-50);
    border-bottom: 1px solid var(--slate-200);
    border-right: 1px solid var(--slate-300);
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--slate-400);
    user-select: none;
    position: sticky;
    left: 0;
    z-index: 20;
  }
  .row-th.selected { background: #e0e7ff; color: var(--indigo); }

  td.cell {
    height: var(--cell-h);
    width: 100px;
    min-width: 100px;
    border-bottom: 1px solid var(--slate-200);
    border-right: 1px solid var(--slate-200);
    padding: 0 6px;
    overflow: hidden;
    white-space: nowrap;
    position: relative;
    cursor: cell;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--slate-800);
  }

  td.cell.selected {
    outline: 2px solid var(--indigo);
    outline-offset: -2px;
    z-index: 10;
  }

  td.cell.in-range { background: #eef2ff; }

  td.cell.has-peer-cursor { outline: 2px solid #f59e0b; outline-offset: -2px; }

  td.cell input.cell-input {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    border: 2px solid var(--indigo);
    outline: none;
    padding: 0 6px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--slate-800);
    background: white;
    z-index: 20;
  }

  .peer-corner {
    position: absolute;
    top: 0; right: 0;
    width: 0; height: 0;
    border-top: 7px solid #f59e0b;
    border-left: 7px solid transparent;
    z-index: 25;
  }

  /* Toasts */
  .toast {
    position: fixed;
    bottom: 20px; right: 20px;
    background: var(--slate-900);
    color: white;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    z-index: 999;
    animation: slideIn 0.25s ease;
    pointer-events: none;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .sign-out-btn {
    border: none; background: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--slate-500);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: all 0.1s;
  }
  .sign-out-btn:hover { color: var(--slate-900); background: var(--slate-100); }
</style>
</head>
<body>

<!-- ══ SIGN-IN SCREEN ══ -->
<div class="screen active" id="signin">
  <div class="signin-card">
    <div class="logo-row">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 18 18" fill="none">
          <rect x="1" y="1" width="7" height="7" rx="1" fill="white" fill-opacity="0.9"/>
          <rect x="10" y="1" width="7" height="7" rx="1" fill="white" fill-opacity="0.6"/>
          <rect x="1" y="10" width="7" height="7" rx="1" fill="white" fill-opacity="0.6"/>
          <rect x="10" y="10" width="7" height="7" rx="1" fill="white" fill-opacity="0.3"/>
        </svg>
      </div>
      <span class="logo-text">CollabSheet</span>
    </div>

    <h2 class="signin-title">Welcome back</h2>
    <p class="signin-sub">Sign in to access your spreadsheets</p>

    <button class="btn-google" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">or continue as guest</div>

    <input class="guest-input" id="guestName" placeholder="Enter your name" maxlength="30"
      onkeydown="if(event.key==='Enter') signInAsGuest()"/>
    <button class="btn-primary" onclick="signInAsGuest()">Continue as Guest</button>
  </div>
</div>

<!-- ══ DASHBOARD SCREEN ══ -->
<div class="screen" id="dashboard">
  <div class="dash-header">
    <div class="dash-logo">
      <div class="logo-icon" style="width:28px;height:28px;border-radius:6px;">
        <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
          <rect x="1" y="1" width="7" height="7" rx="1" fill="white" fill-opacity="0.9"/>
          <rect x="10" y="1" width="7" height="7" rx="1" fill="white" fill-opacity="0.6"/>
          <rect x="1" y="10" width="7" height="7" rx="1" fill="white" fill-opacity="0.6"/>
          <rect x="10" y="10" width="7" height="7" rx="1" fill="white" fill-opacity="0.3"/>
        </svg>
      </div>
      <span>CollabSheet</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="user-avatar" id="dashAvatar" style="background:#4f46e5;">A</div>
      <button class="sign-out-btn" onclick="signOut()">Sign out</button>
    </div>
  </div>

  <div class="dash-main">
    <div class="section-label">Start new</div>
    <div class="new-card" onclick="createDoc()">
      <div class="new-icon">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#94a3b8" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
        </svg>
      </div>
      <span class="new-label">Blank</span>
    </div>

    <div class="section-label">Recent spreadsheets</div>
    <div class="doc-list" id="docList"></div>
    <p id="emptyMsg" style="font-size:14px;color:var(--slate-400);text-align:center;margin-top:40px;display:none;">
      No spreadsheets yet. Create one above!
    </p>
  </div>
</div>

<!-- ══ EDITOR SCREEN ══ -->
<div class="screen" id="editor">
  <!-- Top bar -->
  <div class="editor-topbar">
    <div class="topbar-left">
      <button class="icon-btn" onclick="goToDashboard()" title="Dashboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25A2.25 2.25 0 0113.5 8.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/>
        </svg>
      </button>
      <div class="divider-v"></div>
      <div class="app-logo-sm">
        <svg width="14" height="14" viewBox="0 0 18 18" fill="none">
          <rect x="1" y="1" width="7" height="7" rx="1" fill="white" fill-opacity="0.9"/>
          <rect x="10" y="1" width="7" height="7" rx="1" fill="white" fill-opacity="0.6"/>
          <rect x="1" y="10" width="7" height="7" rx="1" fill="white" fill-opacity="0.6"/>
          <rect x="10" y="10" width="7" height="7" rx="1" fill="white" fill-opacity="0.3"/>
        </svg>
      </div>
    </div>
    <div class="topbar-right">
      <div class="write-status" id="writeStatus">
        <div class="status-dot"></div>
        <span>Saved</span>
      </div>
      <div class="divider-v"></div>
      <div class="presence-bar" id="presenceBar">
        <div class="peer-avatar" style="background:#f59e0b;margin-left:0;" title="Alice (collaborator)">A</div>
        <div class="peer-avatar" style="background:#10b981;" title="Bob (collaborator)">B</div>
      </div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input class="title-input" id="titleInput" value="Untitled spreadsheet" />
    <div class="toolbar-sep"></div>
    <button class="tb-btn" id="btnBold" onclick="toggleFormat('bold')" title="Bold"><b>B</b></button>
    <button class="tb-btn" id="btnItalic" onclick="toggleFormat('italic')" title="Italic"><i>I</i></button>
    <div class="toolbar-sep"></div>
    <button class="tb-btn" onclick="setAlign('left')" title="Align Left">
      <svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M3 5h18v2H3zm0 4h12v2H3zm0 4h18v2H3zm0 4h12v2H3z"/></svg>
    </button>
    <button class="tb-btn" onclick="setAlign('center')" title="Align Center">
      <svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M3 5h18v2H3zm3 4h12v2H6zm-3 4h18v2H3zm3 4h12v2H6z"/></svg>
    </button>
    <button class="tb-btn" onclick="setAlign('right')" title="Align Right">
      <svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M3 5h18v2H3zm6 4h12v2H9zm-6 4h18v2H3zm6 4h12v2H9z"/></svg>
    </button>
    <div class="toolbar-sep"></div>
    <button class="tb-btn" onclick="exportCSV()" title="Export CSV">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/>
      </svg>
      Export CSV
    </button>
  </div>

  <!-- Formula bar -->
  <div class="formula-bar">
    <div class="cell-label" id="cellLabel">A1</div>
    <div class="fx-label">fx</div>
    <input class="formula-input" id="formulaInput" placeholder=""
      onchange="commitFromFormula()"
      onkeydown="handleFormulaKey(event)"/>
  </div>

  <!-- Grid -->
  <div class="grid-container" id="gridContainer">
    <table id="grid"></table>
  </div>
</div>

<script>
// ── STATE ──
const ROWS = 50, COLS = 26;
let state = {
  user: null,
  docs: [],
  currentDoc: null,
  cells: {},       // { "A1": { value, bold, italic, align } }
  selected: { r: 0, c: 0 },
  editing: null,
  formats: {},
};

// Peer simulation
const peers = [
  { name: "Alice", color: "#f59e0b", cell: "C3" },
  { name: "Bob",   color: "#10b981", cell: "E7" },
];

function colLetter(c) {
  return c < 26 ? String.fromCharCode(65 + c) : String.fromCharCode(64 + Math.floor(c/26)) + String.fromCharCode(65 + c%26);
}
function cellKey(r, c) { return colLetter(c) + (r + 1); }

// ── SIGN IN ──
function signInWithGoogle() {
  const name = "Anuj";
  doSignIn(name, "#4f46e5");
}

function signInAsGuest() {
  const name = document.getElementById('guestName').value.trim() || "Guest";
  doSignIn(name, "#" + Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0'));
}

function doSignIn(name, color) {
  state.user = { name, color };
  document.getElementById('dashAvatar').textContent = name[0].toUpperCase();
  document.getElementById('dashAvatar').style.background = color;

  // Sample docs
  state.docs = [
    { id: 1, title: "Q1 Budget 2026", updatedAt: Date.now() - 3600000, cells: {
      "A1": {value:"Item"}, "B1": {value:"Amount"}, "C1": {value:"Status"},
      "A2": {value:"Marketing"}, "B2": {value:"15000"}, "C2": {value:"Approved"},
      "A3": {value:"Engineering"}, "B3": {value:"45000"}, "C3": {value:"Pending"},
      "A4": {value:"Operations"}, "B4": {value:"12000"}, "C4": {value:"Approved"},
      "A5": {value:"Total"}, "B5": {value:"=SUM(B2:B4)"}, "C5": {value:""},
    }},
    { id: 2, title: "Team Roster", updatedAt: Date.now() - 86400000, cells: {
      "A1": {value:"Name"}, "B1": {value:"Role"}, "C1": {value:"Team"},
      "A2": {value:"Alice"}, "B2": {value:"Engineer"}, "C2": {value:"Frontend"},
      "A3": {value:"Bob"}, "B3": {value:"Designer"}, "C3": {value:"UX"},
    }},
  ];
  renderDashboard();
  showScreen('dashboard');
}

function signOut() {
  state.user = null;
  showScreen('signin');
}

// ── DASHBOARD ──
function renderDashboard() {
  const list = document.getElementById('docList');
  const empty = document.getElementById('emptyMsg');
  list.innerHTML = '';
  if (state.docs.length === 0) { empty.style.display = 'block'; list.style.display = 'none'; return; }
  empty.style.display = 'none';
  list.style.display = 'block';
  state.docs.forEach(doc => {
    const div = document.createElement('div');
    div.className = 'doc-item';
    div.innerHTML = `
      <div class="doc-icon">
        <svg width="16" height="16" fill="none" stroke="#4f46e5" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.375 19.5h17.25m-17.25 0a1.125 1.125 0 01-1.125-1.125M3.375 19.5h1.5C5.496 19.5 6 18.996 6 18.375m-3.75.125V5.625m0 12.75h.375C5.496 18.5 6 17.996 6 17.375V5.625"/>
        </svg>
      </div>
      <div class="doc-info">
        <div class="doc-name">${doc.title}</div>
        <div class="doc-meta">${state.user.name} · ${relTime(doc.updatedAt)}</div>
      </div>
      <button class="doc-delete" onclick="deleteDoc(event,${doc.id})">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916"/>
        </svg>
      </button>
    `;
    div.onclick = () => openDoc(doc.id);
    list.appendChild(div);
  });
}

function relTime(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return "just now";
  const m = Math.floor(s / 60);
  if (m < 60) return `${m} min ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h} hr ago`;
  return `${Math.floor(h/24)} days ago`;
}

function createDoc() {
  const id = Date.now();
  const doc = { id, title: "Untitled spreadsheet", updatedAt: Date.now(), cells: {} };
  state.docs.unshift(doc);
  openDoc(id);
}

function deleteDoc(e, id) {
  e.stopPropagation();
  state.docs = state.docs.filter(d => d.id !== id);
  renderDashboard();
}

function openDoc(id) {
  const doc = state.docs.find(d => d.id === id);
  state.currentDoc = doc;
  state.cells = JSON.parse(JSON.stringify(doc.cells));
  document.getElementById('titleInput').value = doc.title;
  buildGrid();
  showScreen('editor');
  selectCell(0, 0);
  simulatePeers();
}

function goToDashboard() {
  saveCurrentDoc();
  showScreen('dashboard');
  renderDashboard();
}

function saveCurrentDoc() {
  if (!state.currentDoc) return;
  state.currentDoc.cells = JSON.parse(JSON.stringify(state.cells));
  state.currentDoc.title = document.getElementById('titleInput').value;
  state.currentDoc.updatedAt = Date.now();
}

// ── GRID ──
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  // Header
  const thead = document.createElement('thead');
  const headRow = document.createElement('tr');
  const cornerTh = document.createElement('th');
  cornerTh.className = 'corner-th';
  headRow.appendChild(cornerTh);
  for (let c = 0; c < COLS; c++) {
    const th = document.createElement('th');
    th.className = 'col-th';
    th.id = `ch-${c}`;
    th.style.width = th.style.minWidth = '100px';
    th.textContent = colLetter(c);
    headRow.appendChild(th);
  }
  thead.appendChild(headRow);
  grid.appendChild(thead);

  // Body
  const tbody = document.createElement('tbody');
  for (let r = 0; r < ROWS; r++) {
    const tr = document.createElement('tr');
    const rowTh = document.createElement('td');
    rowTh.className = 'row-th';
    rowTh.id = `rh-${r}`;
    rowTh.textContent = r + 1;
    tr.appendChild(rowTh);
    for (let c = 0; c < COLS; c++) {
      const td = document.createElement('td');
      td.className = 'cell';
      td.id = `cell-${r}-${c}`;
      td.dataset.r = r;
      td.dataset.c = c;
      td.onmousedown = (e) => { e.preventDefault(); selectCell(r, c); };
      td.ondblclick = () => startEdit(r, c);
      renderCell(r, c);
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  grid.appendChild(tbody);
}

function renderCell(r, c) {
  const td = document.getElementById(`cell-${r}-${c}`);
  if (!td) return;
  const key = cellKey(r, c);
  const cell = state.cells[key];
  const val = cell ? resolveValue(cell.value) : '';
  const isError = typeof val === 'string' && val.startsWith('#');

  td.innerHTML = '';
  const span = document.createElement('span');
  span.style.cssText = `
    display:block; line-height:26px; font-size:12px;
    font-weight:${cell?.bold ? 700 : 400};
    font-style:${cell?.italic ? 'italic' : 'normal'};
    text-align:${cell?.align || 'left'};
    color:${isError ? '#ef4444' : '#1e293b'};
  `;
  span.textContent = String(val ?? '');
  td.appendChild(span);

  // Peer cursors
  const peer = peers.find(p => p.cell === key);
  if (peer) {
    const corner = document.createElement('div');
    corner.className = 'peer-corner';
    corner.style.borderTopColor = peer.color;
    corner.title = peer.name;
    td.appendChild(corner);
    td.style.outline = `2px solid ${peer.color}`;
    td.style.outlineOffset = '-2px';
  } else if (!td.classList.contains('selected')) {
    td.style.outline = '';
  }
}

function resolveValue(val) {
  if (!val || !String(val).startsWith('=')) return val ?? '';
  const formula = String(val).slice(1).toUpperCase().trim();

  // SUM(A1:B3)
  const sumMatch = formula.match(/^SUM\(([A-Z]+\d+):([A-Z]+\d+)\)$/);
  if (sumMatch) {
    return sumRange(sumMatch[1], sumMatch[2]);
  }

  // Simple cell ref like =A1
  const refMatch = formula.match(/^([A-Z]+\d+)$/);
  if (refMatch) {
    const c = state.cells[refMatch[1]];
    return c ? resolveValue(c.value) : 0;
  }

  // Arithmetic
  try {
    const expr = formula.replace(/([A-Z]+\d+)/g, (ref) => {
      const c = state.cells[ref];
      const v = c ? resolveValue(c.value) : 0;
      return isNaN(Number(v)) ? 0 : Number(v);
    });
    const result = Function('"use strict"; return (' + expr + ')')();
    return typeof result === 'number' ? Math.round(result * 1e10) / 1e10 : result;
  } catch { return '#ERROR!'; }
}

function sumRange(from, to) {
  const fromC = from.match(/([A-Z]+)(\d+)/);
  const toC = to.match(/([A-Z]+)(\d+)/);
  if (!fromC || !toC) return '#ERROR!';
  const c1 = fromC[1].charCodeAt(0) - 65, r1 = parseInt(fromC[2]) - 1;
  const c2 = toC[1].charCodeAt(0) - 65,   r2 = parseInt(toC[2]) - 1;
  let sum = 0;
  for (let r = r1; r <= r2; r++)
    for (let c = c1; c <= c2; c++) {
      const v = state.cells[cellKey(r, c)]?.value;
      const n = Number(resolveValue(v));
      if (!isNaN(n)) sum += n;
    }
  return sum;
}

// ── SELECTION ──
function selectCell(r, c) {
  const prev = state.selected;

  // Clear prev
  const prevTd = document.getElementById(`cell-${prev.r}-${prev.c}`);
  if (prevTd) prevTd.classList.remove('selected');
  document.getElementById(`ch-${prev.c}`)?.classList.remove('selected');
  document.getElementById(`rh-${prev.r}`)?.classList.remove('selected');

  state.selected = { r, c };
  const key = cellKey(r, c);

  const td = document.getElementById(`cell-${r}-${c}`);
  if (td) td.classList.add('selected');
  document.getElementById(`ch-${c}`)?.classList.add('selected');
  document.getElementById(`rh-${r}`)?.classList.add('selected');

  // Update formula bar
  document.getElementById('cellLabel').textContent = key;
  document.getElementById('formulaInput').value = state.cells[key]?.value ?? '';

  // Update toolbar format state
  const cell = state.cells[key];
  document.getElementById('btnBold').classList.toggle('active', !!cell?.bold);
  document.getElementById('btnItalic').classList.toggle('active', !!cell?.italic);
}

// ── EDITING ──
function startEdit(r, c) {
  if (state.editing) commitEdit();
  state.editing = { r, c };
  const td = document.getElementById(`cell-${r}-${c}`);
  const key = cellKey(r, c);
  const input = document.createElement('input');
  input.className = 'cell-input';
  input.value = state.cells[key]?.value ?? '';
  input.onkeydown = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); commitEdit(); selectCell(r + 1, c); }
    else if (e.key === 'Tab') { e.preventDefault(); commitEdit(); selectCell(r, c + 1); }
    else if (e.key === 'Escape') { cancelEdit(); }
  };
  input.onblur = () => { if (state.editing) commitEdit(); };
  td.innerHTML = '';
  td.appendChild(input);
  input.focus();
  document.getElementById('formulaInput').value = input.value;
}

function commitEdit() {
  if (!state.editing) return;
  const { r, c } = state.editing;
  const td = document.getElementById(`cell-${r}-${c}`);
  const input = td?.querySelector('input');
  if (input) {
    const key = cellKey(r, c);
    const val = input.value;
    if (val === '' && state.cells[key]) delete state.cells[key];
    else if (val !== '') {
      state.cells[key] = { ...state.cells[key], value: val };
    }
  }
  state.editing = null;
  renderAllCells();
  showSavingIndicator();
}

function cancelEdit() {
  state.editing = null;
  renderAllCells();
}

function renderAllCells() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      renderCell(r, c);
  // Re-apply selection
  const { r, c } = state.selected;
  document.getElementById(`cell-${r}-${c}`)?.classList.add('selected');
}

// ── FORMULA BAR ──
function commitFromFormula() {
  const { r, c } = state.selected;
  const key = cellKey(r, c);
  const val = document.getElementById('formulaInput').value;
  if (val === '') delete state.cells[key];
  else state.cells[key] = { ...state.cells[key], value: val };
  renderAllCells();
  showSavingIndicator();
}

function handleFormulaKey(e) {
  if (e.key === 'Enter') { e.preventDefault(); commitFromFormula(); }
  else if (e.key === 'Escape') {
    document.getElementById('formulaInput').value = state.cells[cellKey(state.selected.r, state.selected.c)]?.value ?? '';
  }
}

// ── GRID KEYBOARD ──
document.addEventListener('keydown', (e) => {
  if (document.getElementById('editor').classList.contains('active') && !state.editing) {
    const { r, c } = state.selected;
    const formulaFocused = document.activeElement === document.getElementById('formulaInput');
    const titleFocused = document.activeElement === document.getElementById('titleInput');
    if (formulaFocused || titleFocused) return;

    if (e.key === 'ArrowUp')    { e.preventDefault(); selectCell(Math.max(0, r-1), c); }
    else if (e.key === 'ArrowDown')  { e.preventDefault(); selectCell(Math.min(ROWS-1, r+1), c); }
    else if (e.key === 'ArrowLeft')  { e.preventDefault(); selectCell(r, Math.max(0, c-1)); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); selectCell(r, Math.min(COLS-1, c+1)); }
    else if (e.key === 'Enter') { e.preventDefault(); startEdit(r, c); }
    else if (e.key === 'Delete' || e.key === 'Backspace') {
      e.preventDefault();
      const key = cellKey(r, c);
      delete state.cells[key];
      renderAllCells();
    } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
      startEdit(r, c);
    }
  }
});

// ── FORMATTING ──
function toggleFormat(type) {
  const key = cellKey(state.selected.r, state.selected.c);
  state.cells[key] = state.cells[key] || { value: '' };
  state.cells[key][type] = !state.cells[key][type];
  renderAllCells();
  document.getElementById(`btn${type.charAt(0).toUpperCase() + type.slice(1)}`).classList.toggle('active', !!state.cells[key][type]);
  showSavingIndicator();
}

function setAlign(align) {
  const key = cellKey(state.selected.r, state.selected.c);
  state.cells[key] = state.cells[key] || { value: '' };
  state.cells[key].align = align;
  renderAllCells();
  showSavingIndicator();
}

// ── EXPORT ──
function exportCSV() {
  const rows = [];
  for (let r = 0; r < ROWS; r++) {
    const row = [];
    let hasData = false;
    for (let c = 0; c < COLS; c++) {
      const val = String(resolveValue(state.cells[cellKey(r, c)]?.value) ?? '');
      if (val) hasData = true;
      row.push(val.includes(',') || val.includes('"') ? `"${val.replace(/"/g,'""')}"` : val);
    }
    if (hasData) rows.push(row.join(','));
  }
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: `${document.getElementById('titleInput').value || 'sheet'}.csv` });
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('CSV exported!');
}

// ── SAVE INDICATOR ──
function showSavingIndicator() {
  const el = document.getElementById('writeStatus');
  el.innerHTML = '<div class="status-dot" style="background:#f59e0b"></div><span>Saving…</span>';
  setTimeout(() => {
    el.innerHTML = '<div class="status-dot" style="background:#22c55e"></div><span>Saved</span>';
    saveCurrentDoc();
  }, 600);
}

// ── PEER SIMULATION ──
function simulatePeers() {
  setInterval(() => {
    peers.forEach(peer => {
      const r = Math.floor(Math.random() * 10);
      const c = Math.floor(Math.random() * 6);
      const oldCell = peer.cell;
      peer.cell = cellKey(r, c);
      renderCell(...parseCellKey(oldCell));
      renderCell(r, c);
    });
  }, 3000);
}

function parseCellKey(key) {
  const m = key.match(/^([A-Z]+)(\d+)$/);
  if (!m) return [0, 0];
  return [parseInt(m[2]) - 1, m[1].charCodeAt(0) - 65];
}

// ── TOAST ──
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ── SCREEN SWITCH ──
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name).classList.add('active');
}
</script>
